<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Clientes | Protección Familiar</title>
    
    <!-- Bootstrap 5 y Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        :root {
            --verde-primario: #2D6A4F;
            --verde-oscuro: #1B4332;
            --fondo-gris: #222725;
            --verde-texto: #52B788;
        }

        body {
            /* Fondo más claro y amigable para el cliente final */
            background: linear-gradient(135deg, #f8faf9 0%, #e2e8e5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .login-wrapper {
            background: #ffffff;
            width: 100%;
            max-width: 450px;
            border-radius: 24px;
            padding: 45px 40px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.07);
            border-top: 6px solid var(--verde-primario);
            position: relative;
        }

        .brand-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .brand-icon {
            font-size: 3rem;
            color: var(--verde-primario);
            margin-bottom: 10px;
        }

        .brand-title {
            font-weight: 800;
            color: #121212;
            font-size: 1.7rem;
            margin-bottom: 5px;
        }

        h4.form-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: #4a5550;
            margin-bottom: 25px;
            text-align: center;
        }

        .form-floating > .form-control {
            border: 2px solid #F0F2F1;
            border-radius: 12px;
            background-color: #F9FBFA;
            transition: all 0.3s ease;
        }

        .form-floating > .form-control:focus {
            border-color: var(--verde-primario);
            box-shadow: 0 0 0 4px rgba(45, 106, 79, 0.1);
            background-color: #FFFFFF;
        }

        .btn-verde {
            background: linear-gradient(135deg, var(--verde-primario), var(--verde-oscuro));
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            width: 100%;
            margin-top: 10px;
            box-shadow: 0 5px 15px rgba(45, 106, 79, 0.2);
            transition: all 0.3s ease;
        }

        .btn-verde:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(45, 106, 79, 0.3);
            color: white;
        }

        .btn-google {
            background-color: #ffffff;
            color: #444;
            border: 2px solid #F0F2F1;
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s;
        }

        .btn-google:hover { background-color: #f8f9fa; border-color: #ddd; }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 25px 0;
            color: #a0aec0;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #F0F2F1;
        }

        .divider:not(:empty)::before { margin-right: 1.5em; }
        .divider:not(:empty)::after { margin-left: 1.5em; }

        .link-verde {
            color: var(--verde-primario);
            text-decoration: none;
            font-weight: 600;
        }

        .link-verde:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="brand-header">
            <i class="bi bi-shield-check brand-icon"></i>
            <h2 class="brand-title">Protección<span style="color: var(--verde-primario);">Familiar</span></h2>
            <p class="text-secondary small">Portal Exclusivo para Clientes</p>
        </div>

        <h4 class="form-title">Iniciar sesión</h4> <!-- -->

        <form id="form-login-cliente">
            <!-- Correo / RUT -->
            <div class="form-floating mb-3">
                <input type="email" class="form-control" id="email-cliente" placeholder="usuario@gmail.com" required>
                <label for="email-cliente">Correo / RUT</label> <!-- -->
            </div>

            <!-- Contraseña -->
            <div class="form-floating mb-2">
                <input type="password" class="form-control" id="password" placeholder="Contraseña" required>
                <label for="password">Contraseña</label> <!-- -->
            </div>

            <div class="text-end mb-4">
                <a href="#" class="link-verde" style="font-size: 0.9rem;">¿Olvidaste tu contraseña?</a> <!-- -->
            </div>

            <button type="submit" class="btn-verde">Acceder</button> <!-- -->
            
            <div class="text-center mt-4">
                <span class="text-secondary small">¿No estás registrado?</span> <!-- -->
                <a href="#" class="link-verde ms-1">Registrarse</a> <!-- -->
            </div>

            <div class="divider">o continuar con</div> <!-- -->

            <!-- Botón Google -->
            <button type="button" class="btn-google">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_Logo.svg" alt="Google" width="18">
                Google
            </button>
        </form>
    </div>

    <script>
        document.getElementById('form-login-cliente').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email-cliente').value.toLowerCase();
            
            // Lógica de validación por dominio
            if (email.endsWith('@gmail.com') || email.endsWith('@outlook.com') || email.endsWith('@hotmail.com') || email.endsWith('@yahoo.com')) {
                // Si el correo es personal, permite el ingreso al dashboard de clientes
                window.location.href = 'dashboard-cliente.html';
            } else if (email.endsWith('@funeraria.cl')) {
                // Si intenta usar el corporativo, le avisa que ese es para el portal RRHH
                alert("Este correo pertenece al personal administrativo. Por favor, ingresa a través del Portal RRHH.");
            } else {
                // Para cualquier otro dominio no reconocido
                alert("Por favor, ingresa con un correo personal válido (@gmail, @outlook, @hotmail).");
            }
        });
    </script>

</body>
</html>
