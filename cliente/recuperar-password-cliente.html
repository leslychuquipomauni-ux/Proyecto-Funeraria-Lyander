<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Acceso | Clientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root { --verde: #2D6A4F; --oscuro: #1B4332; }
        body { background: linear-gradient(135deg, #f8faf9 0%, #e2e8e5 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .card-custom { background: #ffffff; width: 100%; max-width: 450px; border-radius: 24px; padding: 45px 40px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.07); border-top: 6px solid var(--verde); }
        .btn-verde { background: linear-gradient(135deg, var(--verde), var(--oscuro)); color: white; border: none; border-radius: 12px; padding: 14px; font-weight: 700; width: 100%; margin-top: 15px; transition: 0.3s; }
        .btn-verde:hover { transform: translateY(-2px); color: white; }
    </style>
</head>
<body>
    <div class="card-custom">
        <a href="login-cliente.html" class="text-secondary text-decoration-none fw-bold mb-4 d-inline-block">
            <i class="bi bi-chevron-left"></i> Regresar
        </a>
        <h2 class="fw-bold mb-3" style="color: #121212;">Recuperar contraseña</h2>
        <p class="text-secondary small mb-4">Para recuperar su acceso, ingrese su correo electrónico. Le enviaremos un código de validación.</p>

        <form id="form-rec-cliente">
            <div class="form-floating mb-4">
                <input type="email" class="form-control" id="email-c" placeholder="nombre@gmail.com" required style="border-radius: 12px;">
                <label>Correo electrónico</label>
            </div>
            <button type="submit" class="btn-verde">Solicitar código</button>
        </form>
    </div>

    <script>
        document.getElementById('form-rec-cliente').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email-c').value.toLowerCase();
            const validos = ["@gmail.com", "@outlook.com", "@hotmail.com", "@yahoo.com"];
            const esPersonal = validos.some(dominio => email.endsWith(dominio));

            if (esPersonal) {
                window.location.href = 'verificar-codigo-cliente.html';
            } else if (email.endsWith('@funeraria.cl')) {
                alert("Este correo es administrativo. Use el Portal RRHH para recuperar su clave.");
            } else {
                alert("Por favor, ingrese un correo personal válido.");
            }
        });
    </script>
</body>
</html>
