<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Contraseña | Clientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #f8faf9 0%, #e2e8e5 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; }
        .card-custom { background: white; width: 100%; max-width: 450px; border-radius: 24px; padding: 45px 40px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.07); }
        .btn-verde { background: #2D6A4F; color: white; border: none; border-radius: 12px; padding: 14px; width: 100%; font-weight: 700; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="card-custom">
        <h3 class="fw-bold mb-3 text-center">Nueva contraseña</h3>
        <p class="text-secondary text-center small mb-4">Asegúrese de que su nueva contraseña sea segura.</p>

        <form id="form-final-c">
            <div class="mb-3">
                <label class="small fw-bold text-muted">Nueva contraseña</label>
                <input type="password" id="p1" class="form-control p-3" required style="border-radius: 10px; background: #F9FBFA;">
            </div>
            <div class="mb-4">
                <label class="small fw-bold text-muted">Confirmar contraseña</label>
                <input type="password" id="p2" class="form-control p-3" required style="border-radius: 10px; background: #F9FBFA;">
            </div>
            <button type="submit" class="btn-verde">Actualizar y Entrar</button>
        </form>
    </div>

    <script>
        document.getElementById('form-final-c').addEventListener('submit', function(e) {
            e.preventDefault();
            if (document.getElementById('p1').value === document.getElementById('p2').value) {
                alert("¡Contraseña de cliente actualizada!");
                window.location.href = 'login-cliente.html';
            } else {
                alert("Las contraseñas no coinciden.");
            }
        });
    </script>
</body>
</html>
