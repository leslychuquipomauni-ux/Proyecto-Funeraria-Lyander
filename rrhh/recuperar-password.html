<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña | RRHH</title>
    
    <!-- Bootstrap 5 y Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        :root {
            --verde-primario: #2D6A4F;
            --verde-oscuro: #1B4332;
            --fondo-gris: #222725;
            --verde-texto: #52B788;
        }

        body {
            background: radial-gradient(circle at top right, #3a4440, var(--fondo-gris));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .login-wrapper {
            background: #ffffff;
            width: 100%;
            max-width: 450px;
            border-radius: 24px;
            padding: 50px 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
        }

        .login-wrapper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, var(--verde-texto), var(--verde-primario));
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            color: #6c757d;
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 25px;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: var(--verde-primario);
        }

        .brand-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .brand-title {
            font-weight: 800;
            color: #121212;
            font-size: 1.6rem;
            margin-bottom: 15px;
        }

        .instruction-text {
            color: #6c757d;
            font-size: 0.95rem;
            text-align: center;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .form-floating > .form-control {
            border: 2px solid #EAEAEA;
            border-radius: 12px;
            background-color: #FAFCFB;
            transition: all 0.3s ease;
        }

        .form-floating > .form-control:focus {
            border-color: var(--verde-primario);
            box-shadow: 0 0 0 4px rgba(45, 106, 79, 0.1);
        }

        .btn-verde {
            background: linear-gradient(135deg, var(--verde-primario), var(--verde-oscuro));
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            width: 100%;
            margin-top: 10px;
            box-shadow: 0 8px 20px rgba(27, 67, 50, 0.25);
            transition: all 0.3s ease;
        }

        .btn-verde:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(27, 67, 50, 0.4);
            color: white;
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <!-- Enlace Regresar -->
        <a href="login-rrhh.html" class="back-link">
            <i class="bi bi-chevron-left me-1"></i> Regresar
        </a>

        <div class="brand-header">
            <h2 class="brand-title">Recuperación de contraseña</h2> <!-- -->
            <!-- Texto informativo según Mockup -->
            <p class="instruction-text">
                Para recuperar su acceso, ingrese su correo electrónico institucional. 
                Le enviaremos un código de validación al instante.
            </p>
        </div>

        <form id="form-recuperar">
            <div class="form-floating mb-4">
                <input type="email" class="form-control" id="email-recuperar" placeholder="nombre@funeraria.cl" required>
                <label for="email-recuperar"><i class="bi bi-envelope-at me-2"></i>Correo Institucional</label>
            </div>

            <button type="submit" class="btn-verde">
                Solicitar código <i class="bi bi-send ms-2"></i> <!-- -->
            </button>
        </form>
    </div>

    <script>
        document.getElementById('form-recuperar').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email-recuperar').value.toLowerCase();
            
            // Validación de dominio para empleados
            if (email.endsWith('@funeraria.cl')) {
                // Si es correcto, avanza a la verificación del código
                window.location.href = 'verificar-codigo.html';
            } else {
                alert("Error: Debe ingresar su correo corporativo finalizado en @funeraria.cl para recuperar el acceso.");
            }
        });
    </script>

</body>
</html>
