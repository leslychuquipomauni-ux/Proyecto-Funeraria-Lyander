<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña | RRHH</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #222725; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: 'Segoe UI', sans-serif;}
        .card-box { background-color: white; padding: 40px; border-radius: 16px; width: 100%; max-width: 400px; }
        .btn-verde { background-color: #2D6A4F; color: white; border: none; padding: 12px; border-radius: 50px; width: 100%; margin-top: 15px; font-weight: 600; }
        .btn-verde:hover { background-color: #1B4332; color: white; }
    </style>
</head>
<body>
    <div class="card-box text-center">
        <h3 class="fw-bold mb-3">Recuperación de contraseña</h3>
        <p class="text-secondary small mb-4">Ingresa tu correo electrónico y te enviaremos un código de validación.</p>
        
        <input type="email" class="form-control mb-3 p-3 bg-light" placeholder="Usuario@Correo.com">
        
        <button class="btn-verde">Solicitar código</button>
        <a href="login-rrhh.html" class="d-block mt-4" style="color: #2D6A4F; text-decoration: none; font-weight: 500;">Volver al Inicio de Sesión</a>
