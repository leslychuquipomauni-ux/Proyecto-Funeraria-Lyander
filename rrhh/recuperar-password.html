<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña | RRHH</title>
    
    <!-- Bootstrap e Iconos -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        :root {
            --verde-primario: #2D6A4F; 
            --verde-oscuro: #1B4332;   
            --fondo-gris: #222725;     
        }

        body { 
            background-color: var(--fondo-gris); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
        }

        .card-box { 
            background-color: white; 
            padding: 40px 30px; 
            border-radius: 16px; 
            width: 100%; 
            max-width: 400px; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }

        /* Enlace de regresar */
        .back-link { 
            color: #6c757d; 
            text-decoration: none; 
            font-size: 0.95rem; 
            font-weight: 500;
        }

        .back-link:hover { 
            color: var(--verde-primario); 
        }

        .form-label {
            font-weight: 500;
            color: #6c757d;
            font-size: 0.95rem;
            text-align: left;
            display: block;
            margin-bottom: 8px;
        }

        .form-control {
            border-radius: 8px;
            padding: 12px 15px;
            background-color: #F8F9FA;
            border: 1px solid #EAEAEA;
        }

        .form-control:focus {
            border-color: var(--verde-primario);
            box-shadow: 0 0 0 0.25rem rgba(45, 106, 79, 0.25);
            background-color: #FFFFFF;
        }

        .btn-verde { 
            background-color: var(--verde-primario); 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 50px; 
            width: 100%; 
            margin-top: 15px; 
            font-weight: 600; 
            transition: all 0.3s ease;
        }

        .btn-verde:hover { 
            background-color: var(--verde-oscuro); 
            color: white; 
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="card-box text-center">
        
        <!-- Botón de regresar del mockup -->
        <div class="text-start mb-4">
            <a href="login-rrhh.html" class="back-link">
                <i class="bi bi-chevron-left"></i> Regresar
            </a>
        </div>

        <h3 class="fw-bold mb-3">Recuperación de contraseña</h3>
        <p class="text-secondary small mb-4">Para recuperar su acceso, ingrese su correo electrónico. Le enviaremos un código de validación.</p>
        
        <!-- Formulario que te lleva a la verificación del código -->
        <form action="verificar-codigo.html">
            <div class="mb-3 text-start">
                <label for="correo" class="form-label">Correo electrónico</label>
                <input type="email" class="form-control" id="correo" placeholder="Usuario@Correo.com" required>
            </div>
            
            <button type="submit" class="btn-verde">Solicitar código</button>
        </form>
        
    </div>
</body>
</html>
