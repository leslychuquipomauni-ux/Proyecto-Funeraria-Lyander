<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificar Código | RRHH</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #222725; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: 'Segoe UI', sans-serif;}
        .card-box { background-color: white; padding: 40px 30px; border-radius: 16px; width: 100%; max-width: 400px; }
        .btn-verde { background-color: #2D6A4F; color: white; border: none; padding: 12px; border-radius: 50px; width: 100%; margin-top: 10px; font-weight: 600; transition: all 0.3s; }
        .btn-verde:hover { background-color: #1B4332; color: white; }
        .back-link { color: #6c757d; text-decoration: none; font-size: 0.95rem; font-weight: 500;}
        .back-link:hover { color: #2D6A4F; }
    </style>
</head>
<body>
    <div class="card-box text-center position-relative">
        
        <!-- Botón de regresar del mockup -->
        <div class="text-start mb-4">
            <a href="recuperar-password.html" class="back-link">
                <i class="bi bi-chevron-left"></i> &lt; Regresar
            </a>
        </div>

        <h3 class="fw-bold mb-3">Verificación de código</h3>
        <p class="text-secondary small mb-4">Por favor, ingrese el código de verificación de 6 dígitos que hemos enviado a su correo electrónico.</p>
        
        <!-- Formulario que en el futuro llevará a crear nueva contraseña -->
        <form action="dashboard-rrhh.html">
            <input type="text" class="form-control mb-4 p-3 bg-light text-center fs-4 fw-bold" placeholder="------" maxlength="6" required style="letter-spacing: 5px;">
            <button type="submit" class="btn-verde">Confirmar</button>
        </form>

        <p class="mt-4 mb-0 small text-secondary">
            ¿No recibió el código? <a href="#" style="color: #2D6A4F; font-weight: 500; text-decoration: none;">Reenviar en 00:30</a>
        </p>
    </div>
</body>
</html>
