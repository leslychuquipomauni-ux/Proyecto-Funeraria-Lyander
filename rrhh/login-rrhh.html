<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal RRHH | Protección Familiar</title>
    
    <!-- Bootstrap y Iconos -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        :root {
            /* Variables exactas de tu diseño original */
            --verde-primario: #2D6A4F; 
            --verde-oscuro: #1B4332;   
            --fondo-gris: #222725;     
            --verde-texto: #52B788; 
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--fondo-gris) !important;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            color: #F8F9FA !important;
        }

        /* La tarjeta blanca (regla de protección de tu diseño) */
        .card-login {
            background-color: #FFFFFF !important;
            border: none;
            border-radius: 16px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            color: #121212 !important;
        }

        /* Encabezado del logo */
        .brand-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .brand-header h2 {
            font-weight: bold;
            color: #121212;
            margin-bottom: 5px;
        }

        .text-verde {
            color: var(--verde-primario) !important;
        }

        .badge-rrhh {
            background-color: var(--verde-primario);
            color: white;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .form-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 25px;
            text-align: center;
            color: #121212;
        }

        .form-label {
            font-weight: 500;
            color: #6c757d;
            font-size: 0.95rem;
        }

        .form-control {
            border: 1px solid #EAEAEA;
            border-radius: 8px;
            padding: 12px 15px;
            background-color: #F8F9FA;
        }

        .form-control:focus {
            border-color: var(--verde-primario);
            box-shadow: 0 0 0 0.25rem rgba(45, 106, 79, 0.25);
            background-color: #FFFFFF;
        }

        /* Botón estilo original de tu página */
        .btn-verde {
            background-color: var(--verde-primario);
            color: white;
            border-radius: 50px;
            padding: 12px 32px;
            font-weight: 600;
            border: none;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 15px;
        }

        .btn-verde:hover {
            background-color: var(--verde-oscuro);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(27, 67, 50, 0.5);
        }

        .forgot-link {
            color: var(--verde-primario);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .forgot-link:hover {
            color: var(--verde-oscuro);
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="card-login">
        
        <!-- Logo y Área (Estilo extraído de tu navbar) -->
        <div class="brand-header">
            <i class="bi bi-shield-check text-verde fs-1"></i>
            <h2 class="h3">Protección<span class="text-verde">Familiar</span></h2>
            <span class="badge-rrhh">Portal RRHH</span>
        </div>

        <!-- Textos exactos del Mockup PDF -->
        <h3 class="form-title">Iniciar sesión</h3>

<form action="dashboard-rrhh.html"></form>            
            <div class="mb-3">
                <label for="rut" class="form-label">Correo/RUT</label>
                <input type="text" class="form-control" id="rut" placeholder="Usuario@Correo.com" required>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="password" placeholder="••••••••" required>
            </div>

            <div class="mb-3 text-end">
                <a href="recuperar-password.html" class="forgot-link">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="submit" class="btn-verde">Acceder</button>
            
        </form>
    </div>

</body>
</html>
