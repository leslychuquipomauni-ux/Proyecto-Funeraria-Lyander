<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña | RRHH</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root { --verde-primario: #2D6A4F; --verde-oscuro: #1B4332; --fondo-gris: #222725; }
        body { background: radial-gradient(circle at top right, #3a4440, var(--fondo-gris)); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .login-wrapper { background: #ffffff; width: 100%; max-width: 450px; border-radius: 24px; padding: 50px 40px; box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4); position: relative; overflow: hidden; }
        .login-wrapper::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 6px; background: linear-gradient(90deg, #52B788, var(--verde-primario)); }
        .brand-title { font-weight: 800; color: #121212; font-size: 1.6rem; text-align: center; margin-bottom: 30px; }
        .form-floating > .form-control { border: 2px solid #EAEAEA; border-radius: 12px; background-color: #FAFCFB; }
        .form-floating > .form-control:focus { border-color: var(--verde-primario); box-shadow: 0 0 0 4px rgba(45, 106, 79, 0.1); }
        .btn-verde { background: linear-gradient(135deg, var(--verde-primario), var(--verde-oscuro)); color: white; border: none; border-radius: 12px; padding: 14px; font-size: 1.1rem; font-weight: 700; width: 100%; margin-top: 10px; box-shadow: 0 8px 20px rgba(27, 67, 50, 0.25); transition: 0.3s; }
        .btn-verde:hover { transform: translateY(-3px); color: white; }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <h2 class="brand-title">Nueva contraseña</h2>
        <p class="text-secondary text-center small mb-4">Cree una contraseña segura que no haya utilizado anteriormente.</p>

        <form id="form-reset">
            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="pass1" placeholder="Nueva contraseña" required>
                <label><i class="bi bi-lock me-2"></i>Nueva contraseña</label>
            </div>
            <div class="form-floating mb-4">
                <input type="password" class="form-control" id="pass2" placeholder="Confirmar contraseña" required>
                <label><i class="bi bi-shield-check me-2"></i>Confirmar contraseña</label>
            </div>
            <button type="submit" class="btn-verde">Actualizar contraseña</button>
        </form>
    </div>

    <script>
        document.getElementById('form-reset').addEventListener('submit', function(e) {
            e.preventDefault();
            const p1 = document.getElementById('pass1').value;
            const p2 = document.getElementById('pass2').value;

            if (p1 === p2) {
                alert("¡Contraseña actualizada con éxito! Ahora puedes iniciar sesión.");
                window.location.href = 'login-rrhh.html';
            } else {
                alert("Las contraseñas no coinciden. Por favor, verifícalas.");
            }
        });
    </script>
</body>
</html>
