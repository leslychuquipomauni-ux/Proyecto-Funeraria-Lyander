<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificar Código | Clientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --verde: #2D6A4F; }
        body { background: linear-gradient(135deg, #f8faf9 0%, #e2e8e5 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; }
        .card-custom { background: white; width: 100%; max-width: 450px; border-radius: 24px; padding: 45px 40px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.07); text-align: center; }
        .code-input { letter-spacing: 10px; font-size: 2rem; font-weight: 800; text-align: center; border: 2px solid #EAEAEA; border-radius: 12px; padding: 15px; margin-bottom: 25px; width: 100%; }
        .btn-verde { background: #2D6A4F; color: white; border: none; border-radius: 12px; padding: 14px; width: 100%; font-weight: 700; }
    </style>
</head>
<body>
    <div class="card-custom">
        <h3 class="fw-bold mb-3">Verificación de código</h3>
        <p class="text-secondary small mb-4">Ingrese el código de 6 dígitos enviado a su correo personal.</p>
        
        <form id="form-ver-c">
            <input type="text" class="code-input" id="codigo-c" placeholder="000000" maxlength="6" required>
            <button type="submit" class="btn-verde">Confirmar Código</button>
        </form>
    </div>

    <script>
        document.getElementById('form-ver-c').addEventListener('submit', function(e) {
            e.preventDefault();
            if (document.getElementById('codigo-c').value === "999999") {
                window.location.href = 'restablecer-password-cliente.html';
            } else {
                alert("Código incorrecto. Intente con 999999 para la prueba.");
            }
        });
    </script>
</body>
</html>
